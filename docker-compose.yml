version: "3.9"

services:
  backend:
    build: ./backend
    ports:
    - "5000:5000"
    env_file:
      - ./backend/.env
    environment:
      - MONGO_URI=mongodb://mongo:27017/bookmyservice
      - REDIS_HOST=redis
    depends_on:
      - mongo
      - redis

  frontend:
    build: ./frontend
    
    ports:
      - "3000:3000"
    depends_on:
      - backend

  mongo:
    image: mongo
    
    volumes:
      - mongo-data:/data/db

  redis:
    image: redis
    ports:
      - "6379:6379"
    

volumes:
  mongo-data: